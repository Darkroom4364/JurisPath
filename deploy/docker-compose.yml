version: "3.9"

services:
  jurispath:
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JURISPATH_LISTEN: ":8080"
      JURISPATH_POLICY_DIR: /etc/jurispath/policies
    restart: unless-stopped

