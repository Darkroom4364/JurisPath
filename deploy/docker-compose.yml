# JurisPath PoC compose stack
#
# Default startup runs only the JurisPath app in explicit-path demo mode:
#   docker compose -f deploy/docker-compose.yml up --build jurispath
#
# Optional experimental 3-ISD SCION topology:
#   ./deploy/scripts/gen-topo.sh
#   docker compose -f deploy/docker-compose.yml --profile scion-topology up --build
#
# ISD-1 (CH):  AS 1-ff00:0:110 (core)   + AS 1-ff00:0:111 (non-core, validator)
# ISD-2 (EU):  AS 2-ff00:0:210 (core)   + AS 2-ff00:0:211 (non-core, validator)
# ISD-3 (X):   AS 3-ff00:0:310 (core)

x-scion-common: &scion-common
  build:
    context: ./scion
    dockerfile: Dockerfile.scion
  image: jurispath-scion-base
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "supervisorctl -c /etc/supervisor/conf.d/scion.conf status | grep -q 'scion-control.*RUNNING' && supervisorctl -c /etc/supervisor/conf.d/scion.conf status | grep -q 'scion-router.*RUNNING' && supervisorctl -c /etc/supervisor/conf.d/scion.conf status | grep -q 'scion-daemon.*RUNNING'"
      ]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 5s
  networks:
    - transit

services:
  # ── ISD-1 (CH) Core: AS 1-ff00:0:110 ──────────────────────────────────
  as110-ch-core:
    <<: *scion-common
    profiles: ["scion-topology"]
    container_name: as110-ch-core
    hostname: as110
    networks:
      transit:
        ipv4_address: 10.100.0.11
    volumes:
      - ./topology/isd-ch/as110/topology.json:/etc/scion/topology.json:ro
      - ./topology/isd-ch/as110/crypto:/etc/scion/crypto:ro
      - ./scion/conf/cs.toml:/etc/scion/cs.toml:ro
      - ./scion/conf/br.toml:/etc/scion/br.toml:ro
      - ./scion/conf/sd.toml:/etc/scion/sd.toml:ro
    ports:
      - "31000:31000/tcp"   # control service
      - "30452:30452/tcp"   # CS API

  # ── ISD-1 (CH) Non-core: AS 1-ff00:0:111 (validator) ──────────────────
  as111-ch-validator:
    <<: *scion-common
    profiles: ["scion-topology"]
    container_name: as111-ch-validator
    hostname: as111
    networks:
      transit:
        ipv4_address: 10.100.0.12
    volumes:
      - ./topology/isd-ch/as111/topology.json:/etc/scion/topology.json:ro
      - ./topology/isd-ch/as111/crypto:/etc/scion/crypto:ro
      - ./scion/conf/cs.toml:/etc/scion/cs.toml:ro
      - ./scion/conf/br.toml:/etc/scion/br.toml:ro
      - ./scion/conf/sd.toml:/etc/scion/sd.toml:ro

  # ── ISD-2 (EU) Core: AS 2-ff00:0:210 ──────────────────────────────────
  as210-eu-core:
    <<: *scion-common
    profiles: ["scion-topology"]
    container_name: as210-eu-core
    hostname: as210
    networks:
      transit:
        ipv4_address: 10.100.0.21
    volumes:
      - ./topology/isd-eu/as210/topology.json:/etc/scion/topology.json:ro
      - ./topology/isd-eu/as210/crypto:/etc/scion/crypto:ro
      - ./scion/conf/cs.toml:/etc/scion/cs.toml:ro
      - ./scion/conf/br.toml:/etc/scion/br.toml:ro
      - ./scion/conf/sd.toml:/etc/scion/sd.toml:ro

  # ── ISD-2 (EU) Non-core: AS 2-ff00:0:211 (validator) ──────────────────
  as211-eu-validator:
    <<: *scion-common
    profiles: ["scion-topology"]
    container_name: as211-eu-validator
    hostname: as211
    networks:
      transit:
        ipv4_address: 10.100.0.22
    volumes:
      - ./topology/isd-eu/as211/topology.json:/etc/scion/topology.json:ro
      - ./topology/isd-eu/as211/crypto:/etc/scion/crypto:ro
      - ./scion/conf/cs.toml:/etc/scion/cs.toml:ro
      - ./scion/conf/br.toml:/etc/scion/br.toml:ro
      - ./scion/conf/sd.toml:/etc/scion/sd.toml:ro

  # ── ISD-3 (X) Core: AS 3-ff00:0:310 ───────────────────────────────────
  as310-x-core:
    <<: *scion-common
    profiles: ["scion-topology"]
    container_name: as310-x-core
    hostname: as310
    networks:
      transit:
        ipv4_address: 10.100.0.31
    volumes:
      - ./topology/isd-x/as310/topology.json:/etc/scion/topology.json:ro
      - ./topology/isd-x/as310/crypto:/etc/scion/crypto:ro
      - ./scion/conf/cs.toml:/etc/scion/cs.toml:ro
      - ./scion/conf/br.toml:/etc/scion/br.toml:ro
      - ./scion/conf/sd.toml:/etc/scion/sd.toml:ro

  # ── JurisPath Service ─────────────────────────────────────────────────
  jurispath:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: jurispath
    hostname: jurispath
    ports:
      - "8080:8080"
    volumes:
      # Optional TLS cert mount for secure mode.
      - ${JURISPATH_CERTS_DIR:-./certs}:/certs:ro
    environment:
      JURISPATH_LISTEN: ":8080"
      JURISPATH_POLICY_DIR: /etc/jurispath/policies
      JURISPATH_DASHBOARD_DIR: /opt/jurispath/dashboard
      JURISPATH_VALIDATORS: /etc/jurispath/validators.yaml
      JURISPATH_DATA_DIR: /var/lib/jurispath
      JURISPATH_INSECURE: "${JURISPATH_INSECURE:-true}"
      JURISPATH_TLS_CERT: "${JURISPATH_TLS_CERT:-}"
      JURISPATH_TLS_KEY: "${JURISPATH_TLS_KEY:-}"
      JURISPATH_API_TOKEN: "${JURISPATH_API_TOKEN:-}"
      JURISPATH_UNAUTHENTICATED_API: "${JURISPATH_UNAUTHENTICATED_API:-true}"
      JURISPATH_CLI_API_TOKEN: "${JURISPATH_API_TOKEN:-}"
      JURISPATH_SCION_MODE: "${JURISPATH_SCION_MODE:-false}"
      JURISPATH_SCION_DAEMON: "${JURISPATH_SCION_DAEMON:-127.0.0.1:30255}"
      JURISPATH_VALIDATOR_ID: "${JURISPATH_VALIDATOR_ID:-}"
    networks:
      transit:
        ipv4_address: 10.100.0.100
    healthcheck:
      test: ["CMD", "jurispath", "health", "--base-url", "http://127.0.0.1:8080", "--output", "json"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

networks:
  transit:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24
