[supervisord]
nodaemon=true
logfile=/var/log/scion/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:scion-control]
command=/usr/local/bin/scion-control --config /etc/scion/cs.toml
autostart=true
autorestart=true
stdout_logfile=/var/log/scion/control.log
stderr_logfile=/var/log/scion/control-err.log

[program:scion-router]
command=/usr/local/bin/scion-router --config /etc/scion/br.toml
autostart=true
autorestart=true
stdout_logfile=/var/log/scion/router.log
stderr_logfile=/var/log/scion/router-err.log

[program:scion-daemon]
command=/usr/local/bin/scion-daemon --config /etc/scion/sd.toml
autostart=true
autorestart=true
stdout_logfile=/var/log/scion/daemon.log
stderr_logfile=/var/log/scion/daemon-err.log
