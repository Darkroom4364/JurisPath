name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # Resolve the PR head ref for comment-triggered events, where GitHub
  # defaults to the base/default branch instead of the PR branch.
  pr-context:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      is_fork: ${{ steps.resolve.outputs.is_fork }}
      author_authorized: ${{ steps.resolve.outputs.author_authorized }}
    steps:
      - name: Resolve PR ref and check author
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Gate comment-triggered runs to collaborators (OWNER, MEMBER, COLLABORATOR)
          # to prevent arbitrary users from burning API spend
          AUTHORIZED="false"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR events are always authorized (triggered by code push, not arbitrary comments)
            AUTHORIZED="true"
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
              echo "is_fork=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_fork=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # For comment events, check author_association
            ASSOCIATION="${{ github.event.comment.author_association }}"
            case "$ASSOCIATION" in
              OWNER|MEMBER|COLLABORATOR)
                AUTHORIZED="true"
                ;;
            esac

            # Fetch the PR head SHA via API
            PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
            PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '{sha: .head.sha, fork: (.head.repo.full_name != .base.repo.full_name)}')
            echo "ref=$(echo "$PR_DATA" | jq -r .sha)" >> "$GITHUB_OUTPUT"
            echo "is_fork=$(echo "$PR_DATA" | jq -r .fork)" >> "$GITHUB_OUTPUT"
          fi
          echo "author_authorized=${AUTHORIZED}" >> "$GITHUB_OUTPUT"

  review:
    needs: pr-context
    # Skip forked PRs (no secrets) and unauthorized comment authors
    if: |
      needs.pr-context.outputs.is_fork != 'true' &&
      needs.pr-context.outputs.author_authorized == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      # Pin actions by SHA to prevent supply-chain attacks on mutable tags
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.pr-context.outputs.ref }}

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            Review this pull request for:
            - Correctness and potential bugs
            - Security issues (especially around SCION path verification, crypto, and input validation)
            - Consistency with the existing codebase patterns
            - Whether mock/placeholder code is being introduced where real implementations should be used
            Be concise. Focus on issues that matter.
